name: Fair Feeder Morning Report

on:
  schedule:
    - cron: '45 4 * * *'    # GitHub cron is UTC; 06:45 Amsterdam during summer time
  workflow_dispatch:         # Manual trigger for testing

concurrency:
  group: morning-report
  cancel-in-progress: false  # don't cancel a running analysis mid-flight

jobs:
  morning-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          pip install \
            ultralytics \
            easyocr \
            opencv-python-headless \
            papermill \
            ipykernel \
            google-auth \
            google-api-python-client \
            requests \
            nbformat \
            pytz \
            roboflow

      - name: Run analysis notebook
        env:
          GITHUB_ACTIONS: 'true'
          GDRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
          GDRIVE_UPLOAD_FOLDER_ID: ${{ secrets.GDRIVE_UPLOAD_FOLDER_ID }}
          GDRIVE_OUTPUT_FOLDER_ID: ${{ secrets.GDRIVE_OUTPUT_FOLDER_ID }}
          GDRIVE_MODEL_FILE_ID: ${{ secrets.GDRIVE_MODEL_FILE_ID }}
          TelegramBotToken: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TelegramChatId: ${{ secrets.TELEGRAM_CHAT_ID }}
          ROBOFLOW_API_KEY: ${{ secrets.ROBOFLOW_API_KEY }}
          ROBOFLOW_WORKSPACE: ${{ secrets.ROBOFLOW_WORKSPACE }}
        run: |
          papermill morning_report.ipynb /tmp/smoketest_output.ipynb \
            --no-progress-bar \
            --kernel python3

      - name: Upload output notebook (only when analysis fails)
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: smoketest-output-${{ github.run_id }}
          path: /tmp/smoketest_output.ipynb
          retention-days: 3

