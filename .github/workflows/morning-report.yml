name: Fair Feeder Morning Report

on:
  schedule:
    - cron: '23 0 * * *'    # UTC; avoid top-of-hour queue and start early enough for observed 4h+ GitHub delay
  workflow_dispatch:         # Manual trigger for testing
    inputs:
      date_override:
        description: 'Date to process (YYYYMMDD)'
        required: false
        default: ''

concurrency:
  group: morning-report
  cancel-in-progress: false  # don't cancel a running analysis mid-flight

jobs:
  morning-report:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      max-parallel: 1
      matrix:
        camera: [TAPO, LOGITECH]

    steps:
      - name: Record scheduler heartbeat
        env:
          SCHEDULED_CRON: ${{ github.event.schedule }}
          CAMERA_NAME: ${{ matrix.camera }}
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import os
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc)
          cron = os.environ.get("SCHEDULED_CRON", "")
          camera = os.environ.get("CAMERA_NAME", "")
          scheduled = ""
          delay = ""
          if cron:
              minute, hour, *_ = cron.split()
              scheduled_dt = now.replace(hour=int(hour), minute=int(minute), second=0, microsecond=0)
              scheduled = scheduled_dt.isoformat().replace("+00:00", "Z")
              delay = str(max(0, round((now - scheduled_dt).total_seconds() / 60)))

          print(f"GHA_JOB_STARTED_AT_UTC={now.isoformat().replace('+00:00', 'Z')}")
          print(f"GHA_SCHEDULE_CRON={cron}")
          print(f"GHA_SCHEDULED_AT_UTC={scheduled}")
          print(f"GHA_SCHEDULE_DELAY_MIN={delay}")
          print(f"CAMERA_NAME={camera}")
          PY

      - name: Wait until feeding window is complete
        run: |
          python - <<'PY'
          import os
          from datetime import datetime, time
          from zoneinfo import ZoneInfo
          import time as sleep_time

          if os.environ.get("DATE_OVERRIDE"):
              print("Historical date override detected; skipping breakfast wait.")
              exit(0)

          tz = ZoneInfo("Europe/Amsterdam")
          now = datetime.now(tz)
          target = datetime.combine(now.date(), time(6, 35), tzinfo=tz)
          wait_sec = max(0, int((target - now).total_seconds()))
          if wait_sec:
              print(f"Scheduler started early ({now:%H:%M:%S}); waiting {wait_sec//60}m {wait_sec%60}s until {target:%H:%M:%S} Amsterdam.")
              sleep_time.sleep(wait_sec)
          else:
              print(f"Scheduler started after feeding window close ({now:%H:%M:%S} Amsterdam); no wait needed.")
          PY
        env:
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          pip install \
            ultralytics \
            easyocr \
            opencv-python-headless \
            papermill \
            ipykernel \
            google-auth \
            google-api-python-client \
            requests \
            nbformat \
            pytz \
            roboflow

      - name: Run analysis notebook
        env:
          GITHUB_ACTIONS: 'true'
          GDRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
          GDRIVE_UPLOAD_FOLDER_ID: ${{ matrix.camera == 'TAPO' && secrets.GDRIVE_UPLOAD_FOLDER_ID || (matrix.camera == 'LOGITECH' && secrets.GDRIVE_LOGITECH_FOLDER_ID || '') }}
          GDRIVE_OUTPUT_FOLDER_ID: ${{ secrets.GDRIVE_OUTPUT_FOLDER_ID }}
          GDRIVE_MODEL_FILE_ID: ${{ secrets.GDRIVE_MODEL_FILE_ID }}
          TelegramBotToken: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TelegramChatId: ${{ secrets.TELEGRAM_CHAT_ID }}
          ROBOFLOW_API_KEY: ${{ secrets.ROBOFLOW_API_KEY }}
          ROBOFLOW_WORKSPACE: ${{ secrets.ROBOFLOW_WORKSPACE }}
          GITHUB_TOKEN: ${{ github.token }}
          CAMERA_NAME: ${{ matrix.camera }}
        run: |
          papermill morning_report.ipynb /tmp/smoketest_output.ipynb \
            -p CAMERA_NAME "$CAMERA_NAME" \
            -p DATE_OVERRIDE "${{ github.event.inputs.date_override }}" \
            --kernel python3

      - name: Upload output notebook (only when analysis fails)
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: smoketest-output-${{ matrix.camera }}-${{ github.run_id }}
          path: /tmp/smoketest_output.ipynb
          retention-days: 3

      - name: Report scheduler heartbeat
        if: always()
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import os
          from datetime import datetime, timezone

          def parse_z(value):
              if not value:
                  return None
              return datetime.fromisoformat(value.replace("Z", "+00:00"))

          started = parse_z(os.environ.get("GHA_JOB_STARTED_AT_UTC", ""))
          now = datetime.now(timezone.utc)
          runtime = round((now - started).total_seconds() / 60) if started else "unknown"

          print("## Scheduler heartbeat")
          print(f"- Camera: `{os.environ.get('CAMERA_NAME')}`")
          print(f"- Cron: `{os.environ.get('GHA_SCHEDULE_CRON') or 'manual'}`")
          print(f"- Scheduled UTC: `{os.environ.get('GHA_SCHEDULED_AT_UTC') or 'manual'}`")
          print(f"- Job started UTC: `{os.environ.get('GHA_JOB_STARTED_AT_UTC') or 'unknown'}`")
          print(f"- Scheduler delay: `{os.environ.get('GHA_SCHEDULE_DELAY_MIN') or 'n/a'} min`")
          print(f"- Job runtime so far: `{runtime} min`")
          PY
